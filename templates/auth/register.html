<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EstateLink | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../static/css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../../home.html">EstateLink</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="../../home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="../properties/listings.html">Listings</a></li>
          <li class="nav-item"><a class="nav-link" href="../properties/manage.html">Manage Properties</a></li>
          <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="auth-section auth-register section-pad min-vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <form class="form-panel auth-panel" action="login.html" method="get">
            <p class="eyebrow text-primary">Create account</p>
            <h1 class="fw-bold mb-3">Register</h1>
            <div class="row g-3">
              <div class="col-12">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="Your full name">
              </div>
              <div class="col-12">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="you@example.com">
              </div>
              <div class="col-md-6">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Create password">
              </div>
              <div class="col-md-6">
                <label for="confirm-password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirm-password" placeholder="Repeat password">
              </div>
              <div class="col-12">
                <label for="role" class="form-label">Account Role</label>
                <select class="form-select" id="role">
                  <option>Buyer</option>
                  <option>Agent</option>
                  <option>Admin</option>
                </select>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary btn-lg w-100">Create Account</button>
              </div>
            </div>
            <p class="text-muted mt-3 mb-0">Already have an account? <a href="login.html">Login</a></p>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
