<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EstateLink | Add Property</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../static/css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../../home.html">EstateLink</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="../../home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="listings.html">Listings</a></li>
          <li class="nav-item"><a class="nav-link active" href="manage.html">Manage Properties</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="section-pad bg-soft min-vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-9">
          <form class="form-panel" action="manage.html" method="get">
            <p class="eyebrow text-primary">New listing</p>
            <h1 class="fw-bold mb-3">Add Property</h1>
            <div class="row g-3">
              <div class="col-md-8">
                <label for="title" class="form-label">Property Title</label>
                <input type="text" class="form-control" id="title" placeholder="Modern Family Villa">
              </div>
              <div class="col-md-4">
                <label for="price" class="form-label">Price</label>
                <input type="number" class="form-control" id="price" placeholder="420000">
              </div>
              <div class="col-md-6">
                <label for="location" class="form-label">Location</label>
                <input type="text" class="form-control" id="location" placeholder="Nairobi, Kenya">
              </div>
              <div class="col-md-6">
                <label for="type" class="form-label">Property Type</label>
                <select class="form-select" id="type">
                  <option>House</option>
                  <option>Apartment</option>
                  <option>Villa</option>
                  <option>Townhouse</option>
                  <option>Land</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="beds" class="form-label">Bedrooms</label>
                <input type="number" class="form-control" id="beds" placeholder="4">
              </div>
              <div class="col-md-6">
                <label for="baths" class="form-label">Bathrooms</label>
                <input type="number" class="form-control" id="baths" placeholder="3">
              </div>
              <div class="col-12">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" rows="5" placeholder="Describe the property"></textarea>
              </div>
              <div class="col-12">
                <label for="images" class="form-label">Upload Property Images</label>
                <input type="file" class="form-control" id="images" accept="image/*" multiple>
                <div class="form-text">Use the file search/browse button to select multiple property images.</div>
              </div>
              <div class="col-12 d-flex flex-wrap gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Add Property</button>
                <a href="manage.html" class="btn btn-outline-primary btn-lg">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
